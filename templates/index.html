<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Price Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="dash">

        <div class="dash-bezel">
            <svg class="gauge" viewBox="0 0 220 130" aria-hidden="true">
                <path class="gauge-track" d="M 15 115 A 95 95 0 0 1 205 115" />
                <path class="gauge-fill" d="M 15 115 A 95 95 0 0 1 205 115" />
                <g class="gauge-ticks">
                    <line x1="110" y1="20" x2="110" y2="32" />
                    <line x1="42" y1="45" x2="50" y2="53" />
                    <line x1="178" y1="45" x2="170" y2="53" />
                    <line x1="20" y1="112" x2="30" y2="112" />
                    <line x1="200" y1="112" x2="190" y2="112" />
                </g>
                <circle class="gauge-hub" cx="110" cy="115" r="5" />
                <line class="gauge-needle" x1="110" y1="115" x2="70" y2="55" />
            </svg>
            <div class="dash-title">
                <span class="eyebrow">Valuation Instrument</span>
                <h1>Car Price Predictor</h1>
            </div>
        </div>

        <form action="/predict" method="POST" class="dash-form">
            <div class="field">
                <label for="present_price">Present Price <span class="unit">(Lakhs)</span></label>
                <input type="number" step="any" id="present_price" name="present_price" placeholder="6.5" required>
            </div>

            <div class="field">
                <label for="kms_driven">Kilometers Driven</label>
                <input type="number" id="kms_driven" name="kms_driven" placeholder="45000" required>
            </div>

            <div class="field-row">
                <div class="field">
                    <label for="fuel_type">Fuel Type</label>
                    <select id="fuel_type" name="fuel_type">
                        <option value="0">Petrol</option>
                        <option value="1">Diesel</option>
                        <option value="2">CNG</option>
                    </select>
                </div>

                <div class="field">
                    <label for="transmission">Transmission</label>
                    <select id="transmission" name="transmission">
                        <option value="0">Manual</option>
                        <option value="1">Automatic</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label for="seller_type">Seller Type</label>
                <select id="seller_type" name="seller_type">
                    <option value="0">Dealer</option>
                    <option value="1">Individual</option>
                </select>
            </div>

            <div class="field-row">
                <div class="field">
                    <label for="owner">Previous Owners</label>
                    <input type="number" id="owner" name="owner" placeholder="0" required>
                </div>

                <div class="field">
                    <label for="car_age">Car Age <span class="unit">(years)</span></label>
                    <input type="number" id="car_age" name="car_age" placeholder="5" required>
                </div>
            </div>

            <button type="submit" class="btn">
                <span>Predict Price</span>
            </button>
        </form>

        {% if prediction_text %}
            <div class="readout">
                <span class="readout-label">Estimated Value</span>
                <span class="readout-value">{{ prediction_text }}</span>
            </div>
        {% endif %}
    </div>
</body>
</html>
